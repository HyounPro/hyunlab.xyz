<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기계/설계 — hyunlab Education</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF5C8A; --pink-light: #FFE8EF; --pink-mid: #FFB3C8;
      --black: #1A1A1A; --gray: #666; --gray-light: #F5F5F5;
      --gray-mid: #E8E8E8; --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #EFEFEF; font-family: 'Noto Sans KR', sans-serif; color: var(--black); }

    nav {
      background: var(--white); border-bottom: 1.5px solid var(--gray-mid);
      position: sticky; top: 0; z-index: 100;
      padding: 0 40px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 20px; color: var(--pink); text-decoration: none; }
    .logo span { color: var(--black); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a { font-size: 13px; font-weight: 500; color: var(--gray); text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--pink); }

    .page-header {
      background: var(--pink); padding: 44px 40px 36px;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .page-icon {
      font-size: 36px; margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .breadcrumb { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 0.05em; }
    .breadcrumb a { color: rgba(255,255,255,0.8); text-decoration: none; }
    .breadcrumb span { margin: 0 6px; }
    .page-header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(30px, 5vw, 52px); color: var(--white);
      letter-spacing: -1.5px; line-height: 1; position: relative; z-index: 1;
    }
    .page-header-sub { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75); margin-top: 6px; position: relative; z-index: 1; }

    /* 섹션 공통 */
    .content { max-width: 900px; margin: 0 auto; padding: 40px; }
    .section { background: var(--white); border-radius: 14px; padding: 32px; margin-bottom: 20px; border: 1.5px solid var(--gray-mid); }
    .section-label {
      font-family: 'Black Han Sans', sans-serif; font-size: 13px;
      color: var(--pink); letter-spacing: 0.05em;
      margin-bottom: 12px; text-transform: uppercase;
    }
    .section h2 { font-family: 'Black Han Sans', sans-serif; font-size: 20px; margin-bottom: 16px; }

    /* 학과 소개 */
    .intro-placeholder {
      background: var(--gray-light); border-radius: 8px;
      padding: 28px; text-align: center;
      color: var(--gray); font-size: 13px; line-height: 1.7;
      border: 1.5px dashed var(--gray-mid);
    }

    /* 강사 소개 */
    .teacher-card {
      display: flex; gap: 20px; align-items: flex-start;
      padding: 20px; background: var(--gray-light);
      border-radius: 10px; border: 1.5px dashed var(--gray-mid);
    }
    .teacher-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--pink-light); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .teacher-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--gray); }
    .teacher-info p { font-size: 13px; color: var(--gray); line-height: 1.6; }

    /* 취업처 */
    .job-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .job-tag {
      background: var(--pink-light); color: var(--pink);
      font-size: 12px; font-weight: 700; padding: 6px 14px;
      border-radius: 20px;
    }
    .job-placeholder { color: var(--gray); font-size: 13px; font-style: italic; }

    /* 포트폴리오 */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .portfolio-item {
      aspect-ratio: 4/3; border-radius: 8px;
      background: var(--gray-light);
      border: 1.5px dashed var(--gray-mid);
      display: flex; align-items: center; justify-content: center;
      color: var(--gray); font-size: 12px;
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .page-header { padding: 32px 20px 24px; }
      .content { padding: 20px; }
      .section { padding: 24px 20px; }
      .teacher-card { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">hyun<span>lab</span></a>
  <ul>
    <li><a href="/main">Works</a></li>
    <li><a href="/education" class="active">Education</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="/">hyunlab</a><span>›</span><a href="/education">Education</a><span>›</span>기계/설계</div>
  <div class="page-icon">⚙️</div>
  <h1>기계/설계</h1>
  <p class="page-header-sub">Machine & Engineering</p>
</div>

<div class="content">

  <!-- 학과 소개 -->
  <div class="section">
    <div class="section-label">About</div>
    <h2>학과 소개</h2>
    <div class="intro-placeholder">
      학과 소개 내용을 입력해주세요.<br>
      커리큘럼, 수업 방식, 특징 등을 작성할 수 있어요.
    </div>
  </div>

  <!-- 강사 소개 -->
  <div class="section">
    <div class="section-label">Teacher</div>
    <h2>강사 소개</h2>
    <div class="teacher-card">
      <div class="teacher-avatar">👤</div>
      <div class="teacher-info">
        <h3>강사명</h3>
        <p>강사 소개 및 경력을 입력해주세요.</p>
      </div>
    </div>
  </div>

  <!-- 취업처 -->
  <div class="section">
    <div class="section-label">Career</div>
    <h2>취업처</h2>
    <div class="job-list">
      <span class="job-placeholder">취업처 정보를 입력해주세요.</span>
    </div>
  </div>

  <!-- 포트폴리오 -->
  <div class="section">
    <div class="section-label">Portfolio</div>
    <h2>포트폴리오</h2>
    <div class="portfolio-grid">
      <div class="portfolio-item">작품 1</div>
      <div class="portfolio-item">작품 2</div>
      <div class="portfolio-item">작품 3</div>
    </div>
  </div>

</div>

</body>
</html>
