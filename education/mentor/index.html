<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멘토 소개 — hyunlab Education</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'Noto Sans KR', sans-serif; color: #1a1a1a; }
    nav { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: #FF5C8A; text-decoration: none; }
    .logo span { color: #1a1a1a; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav a { font-size: 13px; font-weight: 500; color: #888; text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #1a1a1a; font-weight: 700; }
    .hero { background: #fff; padding: 36px 24px 28px; border-bottom: 1px solid #e8e8e8; text-align: center; }
    .hero-icon { width: 56px; height: 56px; background: #1a1a1a; border-radius: 14px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .breadcrumb { font-size: 11px; color: #aaa; margin-bottom: 12px; }
    .breadcrumb a { color: #888; text-decoration: none; }
    .breadcrumb span { margin: 0 5px; }
    .hero h1 { font-family: 'Black Han Sans', sans-serif; font-size: 32px; color: #1a1a1a; letter-spacing: -1px; margin-bottom: 6px; }
    .hero-sub { font-size: 13px; color: #aaa; }
    .body-wrap { max-width: 560px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    .empty-card { background: #fff; border-radius: 14px; border: 1px dashed #ddd; padding: 56px 32px; }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-card h2 { font-family: 'Black Han Sans', sans-serif; font-size: 18px; margin-bottom: 8px; }
    .empty-card p { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">hyun<span>lab</span></a>
  <ul>
    <li><a href="/main">Works</a></li>
    <li><a href="/education" class="active">Education</a></li>
  </ul>
</nav>
<div class="hero">
  <div class="breadcrumb"><a href="/education">Education</a><span>›</span>멘토 소개</div>
  <div class="hero-icon">🧭</div>
  <h1>멘토 소개</h1>
  <p class="hero-sub">Mentor</p>
</div>
<div class="body-wrap">
  <div class="empty-card">
    <div class="empty-icon">🧭</div>
    <h2>멘토 소개</h2>
    <p>준비 중입니다.</p>
  </div>
</div>
</body>
</html>
