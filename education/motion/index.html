<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D/3D 모션그래픽 — hyunlab Education</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'Noto Sans KR', sans-serif; color: #1a1a1a; }
    nav { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: #FF5C8A; text-decoration: none; }
    .logo span { color: #1a1a1a; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav a { font-size: 13px; font-weight: 500; color: #888; text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #1a1a1a; font-weight: 700; }
    .hero { background: #fff; padding: 36px 24px 28px; border-bottom: 1px solid #e8e8e8; text-align: center; }
    .hero-icon { width: 56px; height: 56px; background: #1a1a1a; border-radius: 14px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .breadcrumb { font-size: 11px; color: #aaa; margin-bottom: 12px; }
    .breadcrumb a { color: #888; text-decoration: none; }
    .breadcrumb span { margin: 0 5px; }
    .hero h1 { font-family: 'Black Han Sans', sans-serif; font-size: 32px; color: #1a1a1a; letter-spacing: -1px; margin-bottom: 6px; }
    .hero-sub { font-size: 13px; color: #aaa; }
    .body-wrap { max-width: 560px; margin: 0 auto; padding: 24px 20px 60px; }
    .section-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.1em; margin-bottom: 12px; margin-top: 28px; }
    .section-label:first-child { margin-top: 0; }
    .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; padding: 22px 20px; }
    .card p { font-size: 14px; color: #555; line-height: 1.8; }
    .teacher-item { display: flex; gap: 14px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
    .teacher-item:last-child { border-bottom: none; padding-bottom: 0; }
    .teacher-item:first-child { padding-top: 0; }
    .t-photo { width: 52px; height: 52px; border-radius: 50%; background: #f0f0f0; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .t-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .t-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .t-info p { font-size: 12px; color: #888; line-height: 1.6; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-size: 12px; font-weight: 700; color: #555; background: #f0f0f0; padding: 5px 12px; border-radius: 20px; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .portfolio-item { aspect-ratio: 4/3; border-radius: 10px; background: #f0f0f0; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #bbb; }
    @media (max-width: 480px) { .hero h1 { font-size: 26px; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">hyun<span>lab</span></a>
  <ul>
    <li><a href="/main">Works</a></li>
    <li><a href="/education" class="active">Education</a></li>
  </ul>
</nav>
<div class="hero">
  <div class="breadcrumb"><a href="/education">Education</a><span>›</span>2D/3D 모션그래픽</div>
  <div class="hero-icon">🎬</div>
  <h1>2D/3D 모션그래픽</h1>
  <p class="hero-sub">Motion Graphics</p>
</div>
<div class="body-wrap">
  <div class="section-label">ABOUT</div>
  <div class="card">
    <p>학과 소개 내용을 입력해주세요.<br>커리큘럼, 수업 방식, 특징 등을 작성할 수 있어요.</p>
  </div>
  <div class="section-label">TEACHER</div>
  <div class="card" id="teacherWrap"></div>
  <div class="section-label">CAREER</div>
  <div class="card"><div class="tag-list"><span style="font-size:13px;color:#bbb;">취업처 정보를 입력해주세요.</span></div></div>
  <div class="section-label">PORTFOLIO</div>
  <div class="card">
    <div class="portfolio-grid">
      <div class="portfolio-item">작품 1</div>
      <div class="portfolio-item">작품 2</div>
      <div class="portfolio-item">작품 3</div>
    </div>
  </div>
</div>
<script>
const TEACHERS = [
  { name:"위성혁", dept:["drawing","ai"], subjects:"디지털드로잉, 2D애니메이션, 웹툰", intro:"(현) SBS아카데미 안산 학과장", photo:"http://sbsansanart.co.kr/img/academy/teacher/artwork/teacher022.png" },
  { name:"정희주", dept:["drawing","editorial"], subjects:"디지털드로잉, 편집디자인", intro:"(현) SBS아카데미 안산 강사", photo:"" },
  { name:"나지우", dept:["drawing","oa"], subjects:"디지털드로잉, GTQ, GTQi", intro:"(현) SBS아카데미 안산 강사", photo:"" },
  { name:"장수지", dept:["interior","machine"], subjects:"캐드, 스케치업, 맥스, 인벤터", intro:"홍익대 실내건축디자인 석사", photo:"http://sbsansanart.co.kr/img/academy/teacher/interior/teacher046.png" },
  { name:"성유진", dept:["interior"], subjects:"캐드, 스케치업, 맥스", intro:"인천대 도시건축학 학사", photo:"http://sbsansanart.co.kr/img/academy/teacher/interior/teacher072.png" },
  { name:"이유진", dept:["interior"], subjects:"캐드, 스케치업, 맥스", intro:"(현) SBS아카데미 안산 강사", photo:"" },
  { name:"이주형", dept:["cg","ai"], subjects:"마야, 누크", intro:"(현) SBS아카데미 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/cg/teacher043.png" },
  { name:"송지우", dept:["motion","ai"], subjects:"시포디, 프리미어, 에펙", intro:"(현) SBS아카데미 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/cg/teacher084.png" },
  { name:"이정우", dept:["motion"], subjects:"시포디, 프리미어, 에펙", intro:"(현) SBS아카데미 안산 강사", photo:"" },
  { name:"서재현", dept:["it"], subjects:"웹, 백엔드, 바이브코딩", intro:"한양대(ERICA) 소프트웨어 학사", photo:"" },
  { name:"이효근", dept:["oa","ai"], subjects:"컴활, MOS, GTQ, GTQi", intro:"(현) SBS아카데미 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/office/teacher020.png" },
  { name:"양윤석", dept:["oa"], subjects:"전산회계, 전산세무", intro:"(현) SBS아카데미 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/office/teacher021.png" },
];
const SLUG = "motion";
const filtered = TEACHERS.filter(t => t.dept.includes(SLUG));
const wrap = document.getElementById('teacherWrap');
if (filtered.length === 0) {
  wrap.innerHTML = '<p style="font-size:13px;color:#bbb;">강사 정보를 입력해주세요.</p>';
} else {
  wrap.innerHTML = filtered.map(t => `
    <div class="teacher-item">
      <div class="t-photo">${t.photo ? `<img src="${t.photo}" alt="${t.name}" onerror="this.parentElement.innerHTML='👤'">` : '👤'}</div>
      <div class="t-info"><h3>${t.name}</h3><p>${t.subjects}<br>${t.intro}</p></div>
    </div>`).join('');
}
</script>
</body>
</html>
