<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강사 소개 — hyunlab Education</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF5C8A; --pink-light: #FFE8EF; --pink-mid: #FFB3C8;
      --black: #1A1A1A; --gray: #666; --gray-light: #F5F5F5;
      --gray-mid: #E8E8E8; --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #EFEFEF; font-family: 'Noto Sans KR', sans-serif; color: var(--black); }
    nav { background: var(--white); border-bottom: 1.5px solid var(--gray-mid); position: sticky; top: 0; z-index: 100; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 20px; color: var(--pink); text-decoration: none; }
    .logo span { color: var(--black); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a { font-size: 13px; font-weight: 500; color: var(--gray); text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--pink); }
    .page-header { background: var(--pink); padding: 44px 40px 36px; position: relative; overflow: hidden; }
    .page-header::before { content: ''; position: absolute; top: -30px; right: -30px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    .breadcrumb { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 0.05em; }
    .breadcrumb a { color: rgba(255,255,255,0.8); text-decoration: none; }
    .breadcrumb span { margin: 0 6px; }
    .page-icon { font-size: 36px; margin-bottom: 10px; position: relative; z-index: 1; }
    .page-header h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(30px, 5vw, 52px); color: var(--white); letter-spacing: -1.5px; line-height: 1; position: relative; z-index: 1; }
    .page-header-sub { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75); margin-top: 6px; position: relative; z-index: 1; }
    .content { max-width: 1000px; margin: 0 auto; padding: 40px; }
    .teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .teacher-card { background: var(--white); border-radius: 14px; border: 1.5px solid var(--gray-mid); overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
    .teacher-card:hover { border-color: var(--pink); box-shadow: 0 4px 20px rgba(255,92,138,0.12); }
    .teacher-photo { width: 100%; aspect-ratio: 3/2; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 56px; overflow: hidden; }
    .teacher-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .teacher-body { padding: 20px 20px 24px; }
    .teacher-name { font-family: 'Black Han Sans', sans-serif; font-size: 20px; margin-bottom: 10px; }
    .dept-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .dept-tag { background: var(--pink-light); color: var(--pink); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .subject-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .subject-label { font-size: 11px; font-weight: 700; color: var(--gray); background: var(--gray-light); padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .subject-value { font-size: 13px; color: var(--black); line-height: 1.6; }
    .teacher-intro { font-size: 13px; color: var(--gray); line-height: 1.7; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gray-mid); }
    @media (max-width: 600px) { nav { padding: 0 20px; } .page-header { padding: 32px 20px 24px; } .content { padding: 20px; } .teacher-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">hyun<span>lab</span></a>
  <ul>
    <li><a href="/main">Works</a></li>
    <li><a href="/education" class="active">Education</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="/">hyunlab</a><span>›</span><a href="/education">Education</a><span>›</span>강사 소개</div>
  <div class="page-icon">🎓</div>
  <h1>강사 소개</h1>
  <p class="page-header-sub">Teacher</p>
</div>
<div class="content">
  <div class="teacher-grid" id="teacherGrid"></div>
</div>

<script>
const DEPT_KO = {
  editorial: '시각/편집디자인', drawing: '드로잉/아트웍',
  motion: '2D/3D 모션그래픽', cg: 'CG/마야',
  interior: '인테리어/건축', machine: '기계/설계',
  it: 'IT/웹/프로그래밍', youtube: '유튜브',
  ai: 'AI', oa: '자격증/OA',
};

// ── 강사 데이터 ──────────────────────────────────────────
const TEACHERS = [
  { name:"위성혁", dept:["drawing","ai"], subjects:"디지털드로잉, 2D애니메이션, 웹툰", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 학과장", photo:"http://sbsansanart.co.kr/img/academy/teacher/artwork/teacher022.png" },
  { name:"정희주", dept:["drawing","editorial"], subjects:"디지털드로잉, 편집디자인", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"" },
  { name:"나지우", dept:["drawing","oa"], subjects:"디지털드로잉, GTQ, GTQi", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"" },
  { name:"장수지", dept:["interior","machine"], subjects:"캐드, 스케치업, 맥스, 인벤터", intro:"홍익대 실내건축디자인 석사, 다원앤컴퍼니 재직", photo:"http://sbsansanart.co.kr/img/academy/teacher/interior/teacher046.png" },
  { name:"성유진", dept:["interior"], subjects:"캐드, 스케치업, 맥스", intro:"인천대 도시건축학 학사", photo:"http://sbsansanart.co.kr/img/academy/teacher/interior/teacher072.png" },
  { name:"이유진", dept:["interior"], subjects:"캐드, 스케치업, 맥스", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"" },
  { name:"이주형", dept:["cg","ai"], subjects:"마야, 누크", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/cg/teacher043.png" },
  { name:"송지우", dept:["motion","ai"], subjects:"시포디, 프리미어, 에펙", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/cg/teacher084.png" },
  { name:"이정우", dept:["motion"], subjects:"시포디, 프리미어, 에펙", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"" },
  { name:"서재현", dept:["it"], subjects:"웹, 백엔드, 바이브코딩", intro:"한양대(ERICA) 소프트웨어 학사", photo:"" },
  { name:"이효근", dept:["oa","ai"], subjects:"컴활, MOS, GTQ, GTQi", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/office/teacher020.png" },
  { name:"양윤석", dept:["oa"], subjects:"전산회계, 전산세무", intro:"(현) SBS아카데미 컴퓨터아트학원 안산 강사", photo:"http://sbsansanart.co.kr/img/academy/teacher/office/teacher021.png" },
];
// ─────────────────────────────────────────────────────────

function renderTeachers(list) {
  const grid = document.getElementById('teacherGrid');
  grid.innerHTML = list.map(t => `
    <div class="teacher-card">
      <div class="teacher-photo">
        ${t.photo
          ? `<img src="${t.photo}" alt="${t.name}" onerror="this.parentElement.innerHTML='👤'">`
          : '👤'}
      </div>
      <div class="teacher-body">
        <div class="teacher-name">${t.name}</div>
        <div class="dept-tags">
          ${t.dept.map(d => `<span class="dept-tag">${DEPT_KO[d] || d}</span>`).join('')}
        </div>
        <div class="subject-row">
          <span class="subject-label">담당과목</span>
          <span class="subject-value">${t.subjects}</span>
        </div>
        <p class="teacher-intro">${t.intro}</p>
      </div>
    </div>
  `).join('');
}

renderTeachers(TEACHERS);
</script>
</body>
</html>
