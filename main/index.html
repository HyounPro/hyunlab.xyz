<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — hyunlab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:       #FF5C8A;
      --pink-light: #FFE8EF;
      --pink-mid:   #FFB3C8;
      --black:      #1A1A1A;
      --gray:       #666;
      --gray-light: #F5F5F5;
      --gray-mid:   #E8E8E8;
      --white:      #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #EFEFEF; font-family: 'Noto Sans KR', sans-serif; color: var(--black); }

    nav {
      background: var(--white); border-bottom: 1.5px solid var(--gray-mid);
      position: sticky; top: 0; z-index: 100;
      padding: 0 40px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Black Han Sans', sans-serif; font-size: 20px; color: var(--pink); text-decoration: none; }
    .logo span { color: var(--black); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a { font-size: 13px; font-weight: 500; color: var(--gray); text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--pink); }

    /* PAGE HEADER */
    .page-header {
      background: var(--pink); padding: 44px 40px 36px;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .breadcrumb {
      font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6);
      margin-bottom: 8px; letter-spacing: 0.05em;
    }
    .breadcrumb a { color: rgba(255,255,255,0.8); text-decoration: none; }
    .breadcrumb span { margin: 0 6px; }
    .page-header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(36px, 6vw, 60px); color: var(--white);
      letter-spacing: -1.5px; line-height: 1; position: relative; z-index: 1;
    }
    .page-header-sub {
      font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.8);
      margin-top: 8px; position: relative; z-index: 1;
    }

    /* FILTER BAR */
    .filter-bar {
      background: var(--white); border-bottom: 1.5px solid var(--gray-mid);
      padding: 0 40px; display: flex; align-items: center;
      gap: 0; overflow-x: auto;
    }
    .cat-btn {
      padding: 14px 20px; font-size: 13px; font-weight: 500;
      color: var(--gray); border: none; background: transparent;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      border-bottom: 2.5px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .cat-btn:hover { color: var(--pink); }
    .cat-btn.active { color: var(--pink); border-bottom-color: var(--pink); font-weight: 700; }
    .filter-count {
      margin-left: auto; padding: 14px 40px;
      font-size: 12px; color: var(--gray); white-space: nowrap;
    }

    /* WORKS GRID */
    .works-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 40px; }
    .works-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* CARD */
    .work-card {
      background: var(--white); border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
    }
    .work-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(255,92,138,0.15);
    }
    .work-thumb {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; position: relative; overflow: hidden;
    }
    .work-thumb.pink  { background: var(--pink-light); }
    .work-thumb.blue  { background: #E8F4FF; }
    .work-thumb.purple{ background: #F0EEFF; }
    .work-thumb.green { background: #EDFAF1; }

    /* accent bar on hover */
    .work-card::after {
      content: ''; display: block; height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--pink-mid));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s ease;
    }
    .work-card:hover::after { transform: scaleX(1); }

    .work-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
    .work-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .work-badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-dev    { background: #E8F4FF; color: #1a6bb5; }
    .badge-design { background: var(--pink-light); color: var(--pink); }
    .badge-motion { background: #F0EEFF; color: #6b3fb5; }
    .badge-other  { background: var(--gray-light); color: var(--gray); }
    .badge-new    { background: var(--pink); color: white; }
    .work-date { font-size: 11px; color: var(--gray); margin-left: auto; }
    .work-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 17px; color: var(--black); letter-spacing: -0.3px;
      margin-bottom: 8px; line-height: 1.25;
    }
    .work-desc { font-size: 12.5px; color: var(--gray); line-height: 1.65; flex: 1; }
    .work-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--gray-light);
    }
    .work-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag-chip {
      font-size: 10px; font-weight: 500; padding: 3px 8px;
      background: var(--gray-light); color: var(--gray); border-radius: 4px;
    }
    .work-arrow { font-size: 16px; color: var(--pink); transition: transform 0.2s; }
    .work-card:hover .work-arrow { transform: translateX(4px); }

    /* EMPTY STATE */
    .empty {
      grid-column: 1/-1; text-align: center; padding: 80px 20px;
    }
    .empty-icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .empty h3 {
      font-family: 'Black Han Sans', sans-serif; font-size: 22px;
      color: var(--black); margin-bottom: 8px;
    }
    .empty p { font-size: 13px; color: var(--gray); }

    /* FOOTER */
    footer {
      background: var(--black); padding: 28px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo { font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: var(--white); }
    .footer-logo span { color: var(--pink); }
    footer p { font-size: 11px; color: #555; }
    .footer-badge { background: var(--pink); color: white; font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }

    @media (max-width: 768px) {
      nav, .filter-bar { padding: 0 20px; }
      .page-header { padding: 36px 20px 28px; }
      .works-wrap { padding: 28px 20px; }
      .works-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 12px; text-align: center; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .works-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">hyun<span>lab</span></a>
  <ul>
    <li><a href="/main" class="active">Works</a></li>
    <li><a href="/review">Review</a></li>
    <li><a href="/intro">About</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="/">Home</a><span>/</span>Works</div>
  <h1>ALL WORKS</h1>
  <p class="page-header-sub">지금까지 만들어온 것들</p>
</div>

<div class="filter-bar">
  <button class="cat-btn active" data-cat="all">전체</button>
  <button class="cat-btn" data-cat="consult">상담자료</button>
  <button class="cat-btn" data-cat="personal">개인자료</button>
  <button class="cat-btn" data-cat="growth">자기계발</button>
  <span class="filter-count" id="count">총 1개</span>
</div>

<main class="works-wrap">
  <div class="works-grid" id="grid">

    <a href="/main/01" class="work-card" data-cat="consult">
      <div class="work-thumb pink">🎁</div>
      <div class="work-body">
        <div class="work-meta">
          <span class="work-badge badge-design">Design</span>
          <span class="work-badge badge-new">NEW</span>
          <span class="work-date">2026.03</span>
        </div>
        <div class="work-title">리뷰이벤트 카드 — SBS아카데미 안산</div>
        <p class="work-desc">수강생 후기 이벤트용 홍보 카드. 참여 조건 안내, 실제 후기 예시, 네이버·카카오·구글 지도 QR코드를 담은 A5 인쇄용 디자인.</p>
        <div class="work-footer">
          <div class="work-tags"><span class="tag-chip">HTML/CSS</span><span class="tag-chip">QR코드</span><span class="tag-chip">인쇄물</span></div>
          <span class="work-arrow">→</span>
        </div>
      </div>
    </a>

      </div>
</main>

<footer>
  <div class="footer-logo">hyun<span>lab</span></div>
  <p>© 2026 hyunlab. All rights reserved.</p>
  <div class="footer-badge">hyunlab.xyz</div>
</footer>

<script>
  const cards = document.querySelectorAll('.work-card');
  const count = document.getElementById('count');

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      let visible = 0;
      cards.forEach(card => {
        const show = cat === 'all' || card.dataset.cat === cat;
        card.style.display = show ? 'flex' : 'none';
        if (show) visible++;
      });
      count.textContent = `총 ${visible}개`;
    });
  });
</script>
</body>
</html>
