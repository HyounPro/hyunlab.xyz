<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이벤트 참여 — SBS아카데미 컴퓨터아트학원 안산점</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f8f8f8;
      --border: #e8e8e8;
      --border-hover: #c0c0c0;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #111111;
      --accent-light: #f0f0f0;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 32px;
    }

    .logo {
      display: block;
      margin: 0 auto 28px;
      width: 56px;
      height: 56px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
      letter-spacing: 0.01em;
    }

    .qr-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      border-radius: 4px;
    }

    .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      background: var(--text-primary);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-secondary);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-secondary:hover { border-color: var(--text-primary); color: var(--text-primary); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── 인쇄 (A4) ── */
    .print-url { display: none; }

    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm 20mm;
      }

      html, body {
        background: #fff;
        min-height: unset;
        padding: 0;
        display: block;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 267mm; /* 297 - 30mm margin */
      }

      .container { animation: none; }

      .btn-row,
      .divider,
      .footer,
      .hint { display: none !important; }

      .qr-wrap {
        padding: 40px;
        border: 1.5px solid #ddd;
        box-shadow: none;
        margin-bottom: 20px;
      }

      .print-url {
        display: block;
        font-size: 12px;
        color: #aaa;
        margin-top: 16px;
        word-break: break-all;
        letter-spacing: 0.01em;
      }
    }

    @media (max-width: 480px) {
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="container">

  <span class="badge">SBS아카데미 컴퓨터아트학원 안산점</span>

  <svg class="logo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="56" height="56" rx="16" fill="#111"/>
    <rect x="14" y="18" width="10" height="10" rx="2" fill="white"/>
    <rect x="14" y="30" width="10" height="8" rx="2" fill="white" opacity="0.5"/>
    <rect x="26" y="18" width="16" height="4" rx="2" fill="white"/>
    <rect x="26" y="25" width="12" height="4" rx="2" fill="white" opacity="0.7"/>
    <rect x="26" y="32" width="8" height="4" rx="2" fill="white" opacity="0.4"/>
  </svg>

  <h1>이벤트<br>참여하기</h1>
  <p class="subtitle">QR코드를 스캔해 참여해 주세요</p>

  <div class="qr-wrap">
    <div id="qrcode"></div>
  </div>

  <p class="hint">
    카메라 앱으로 QR코드를 비추면 바로 이동합니다<br>
    또는 아래 버튼으로 직접 이동하세요
  </p>

  <div class="divider"><span>바로 가기</span></div>

  <div class="btn-row">
    <a href="https://form.naver.com/response/fYVfthvrOK-NrPLytttJpA" target="_blank" class="btn-primary">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
      </svg>
      네이버 폼 바로 가기
    </a>
    <button class="btn-secondary" onclick="window.print()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.056 48.056 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5zm-3 0h.008v.008H15V10.5z"/>
      </svg>
      인쇄
    </button>
  </div>

  <span class="print-url">form.naver.com/response/fYVfthvrOK-NrPLytttJpA</span>

  <div class="footer">
    본 페이지는 이벤트 참여 안내를 위한 페이지입니다
  </div>

</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://form.naver.com/response/fYVfthvrOK-NrPLytttJpA",
    width: 240,
    height: 240,
    colorDark: "#111111",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
