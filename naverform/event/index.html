<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이벤트 참여 | SBS아카데미 컴퓨터아트학원 안산점</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #FF5C8A;
      --primary-dark: #e04070;
      --primary-light: #fff0f4;
      --text-dark: #1a1a1a;
      --text-mid: #555;
      --text-light: #999;
      --border: #f0f0f0;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f8f8f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* 배경 장식 */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,92,138,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(255,92,138,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* 헤더 */
    .header {
      width: 100%;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 36px 40px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .brand-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 14px;
      color: var(--text-mid);
      letter-spacing: 0.02em;
    }

    .event-badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 26px;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .title span {
      color: var(--primary);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* QR 카드 */
    .qr-card {
      width: 100%;
      background: var(--white);
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .qr-wrapper {
      position: relative;
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(255,92,138,0.12), 0 1px 8px rgba(0,0,0,0.06);
      border: 1.5px solid rgba(255,92,138,0.15);
    }

    /* QR 모서리 장식 */
    .qr-wrapper::before,
    .qr-wrapper::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--primary);
      border-style: solid;
    }
    .qr-wrapper::before {
      top: -2px; left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0;
    }
    .qr-wrapper::after {
      bottom: -2px; right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0;
    }

    /* 추가 모서리 */
    .qr-corner-tr,
    .qr-corner-bl {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--primary);
      border-style: solid;
    }
    .qr-corner-tr {
      top: -2px; right: -2px;
      border-width: 3px 3px 0 0;
      border-radius: 0 4px 0 0;
    }
    .qr-corner-bl {
      bottom: -2px; left: -2px;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 4px;
    }

    #qrcode {
      display: block;
      line-height: 0;
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      border-radius: 4px;
    }

    .qr-label {
      text-align: center;
    }

    .qr-label .icon {
      font-size: 22px;
      margin-bottom: 6px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .qr-label p {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .qr-label small {
      font-size: 12px;
      color: var(--text-light);
    }

    /* 구분선 */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      color: var(--text-light);
      white-space: nowrap;
    }

    /* 직접 이동 버튼 */
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
    }

    .link-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,92,138,0.35);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
      flex-shrink: 0;
    }

    /* 푸터 */
    .footer {
      width: 100%;
      background: #fafafa;
      border-top: 1px solid var(--border);
      border-radius: 0 0 20px 20px;
      padding: 18px 40px;
      text-align: center;
    }

    .footer p {
      font-size: 11px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .footer strong {
      color: var(--text-mid);
      font-weight: 500;
    }

    /* 입장 애니메이션 */
    .container {
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .header,
      .qr-card,
      .footer {
        padding-left: 24px;
        padding-right: 24px;
      }

      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">SBS아카데미 컴퓨터아트학원 안산점</span>
    </div>
    <div class="event-badge">📋 EVENT</div>
    <h1 class="title">QR코드를 스캔하고<br><span>참여해 주세요!</span></h1>
    <p class="subtitle">카메라 앱으로 QR코드를 비추면<br>바로 이동합니다</p>
  </div>

  <div class="qr-card">
    <div class="qr-wrapper">
      <div class="qr-corner-tr"></div>
      <div class="qr-corner-bl"></div>
      <div id="qrcode"></div>
    </div>

    <div class="qr-label">
      <span class="icon">📱</span>
      <p>카메라로 스캔하세요</p>
      <small>또는 아래 버튼으로 직접 이동</small>
    </div>

    <div class="divider">
      <span>직접 이동</span>
    </div>

    <a href="https://form.naver.com/response/fYVfthvrOK-NrPLytttJpA" target="_blank" class="link-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
      </svg>
      네이버 폼 바로 가기
    </a>
  </div>

  <div class="footer">
    <p><strong>SBS아카데미 컴퓨터아트학원 안산점</strong><br>
    본 페이지는 이벤트 참여를 위한 안내 페이지입니다.</p>
  </div>
</div>

<script>
  // QR 코드 생성 (크게)
  new QRCode(document.getElementById("qrcode"), {
    text: "https://form.naver.com/response/fYVfthvrOK-NrPLytttJpA",
    width: 260,
    height: 260,
    colorDark: "#1a1a1a",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
