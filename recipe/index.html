<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 아카이브 · hyunlab</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --pink:#FF5C8A; --pink-light:#FFE8EF; --pink-mid:#FFB3C8; --black:#1A1A1A; --gray:#666; --gray-light:#F5F5F5; --gray-mid:#E8E8E8; --white:#FFFFFF; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:#EFEFEF; font-family:'Noto Sans KR',sans-serif; color:var(--black); }
    nav { background:var(--white); border-bottom:1.5px solid var(--gray-mid); position:sticky; top:0; z-index:100; padding:0 40px; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:'Black Han Sans',sans-serif; font-size:20px; color:var(--pink); text-decoration:none; }
    nav ul { list-style:none; display:flex; gap:2rem; }
    nav a { font-size:13px; font-weight:500; color:var(--gray); text-decoration:none; transition:color 0.2s; }
    nav a:hover { color:var(--pink); }
    .hero { background:var(--pink); padding:44px 40px 40px; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.1); }
    .hero::after { content:''; position:absolute; bottom:-50px; right:140px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.07); }
    .hero-inner { position:relative; z-index:1; }
    .hero-eyebrow { font-size:11px; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,0.65); text-transform:uppercase; margin-bottom:8px; }
    .hero-title { font-family:'Black Han Sans',sans-serif; font-size:40px; color:var(--white); line-height:1; letter-spacing:-1px; margin-bottom:10px; }
    .hero-sub { font-size:14px; color:rgba(255,255,255,0.8); font-weight:500; }
    .search-wrap { background:var(--white); border-bottom:1.5px solid var(--gray-mid); padding:20px 40px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .search-box { flex:1; min-width:200px; display:flex; align-items:center; gap:10px; background:var(--gray-light); border:1.5px solid var(--gray-mid); border-radius:10px; padding:10px 16px; transition:border-color 0.2s; }
    .search-box:focus-within { border-color:var(--pink); }
    .search-box input { border:none; background:none; outline:none; font-size:14px; font-family:'Noto Sans KR',sans-serif; width:100%; color:var(--black); }
    .search-box input::placeholder { color:#bbb; }
    .sort-select { padding:10px 14px; border-radius:10px; border:1.5px solid var(--gray-mid); background:var(--white); font-size:13px; font-family:'Noto Sans KR',sans-serif; color:var(--black); outline:none; cursor:pointer; }
    .sort-select:focus { border-color:var(--pink); }
    .filter-wrap { background:var(--white); border-bottom:1.5px solid var(--gray-mid); padding:12px 40px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-label { font-size:12px; color:var(--gray); font-weight:500; margin-right:4px; }
    .chip { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; border:1.5px solid var(--gray-mid); background:var(--white); color:var(--gray); cursor:pointer; transition:all 0.15s; }
    .chip:hover { border-color:var(--pink); color:var(--pink); }
    .chip.active { background:var(--pink); border-color:var(--pink); color:var(--white); }
    .container { max-width:960px; margin:0 auto; padding:32px 40px; }
    .count-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .count-text { font-size:13px; color:var(--gray); font-weight:500; }
    .count-text strong { color:var(--pink); font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
    .recipe-card { background:var(--white); border-radius:14px; border:1.5px solid var(--gray-mid); overflow:hidden; text-decoration:none; color:inherit; transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s; display:block; }
    .recipe-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(255,92,138,0.13); border-color:var(--pink-mid); }
    .card-thumb { width:100%; aspect-ratio:4/3; background:var(--pink-light); display:flex; align-items:center; justify-content:center; font-size:48px; overflow:hidden; position:relative; }
    .card-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .card-body { padding:16px 18px 20px; }
    .card-num { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--pink); margin-bottom:6px; }
    .card-name { font-family:'Black Han Sans',sans-serif; font-size:18px; color:var(--black); margin-bottom:8px; line-height:1.3; }
    .card-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .tag { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:var(--pink-light); color:var(--pink); }
    .card-desc { font-size:12px; color:var(--gray); line-height:1.6; }
    .card-meta { display:flex; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--gray-light); font-size:11px; color:var(--gray); }
    .match-hint { font-size:11px; color:var(--pink); font-weight:600; margin-top:6px; display:none; }
    .empty { text-align:center; padding:80px 20px; display:none; }
    .empty.show { display:block; }
    .empty-icon { font-size:48px; margin-bottom:16px; }
    .empty p { color:var(--gray); font-size:14px; }
    @media(max-width:600px){ nav { padding:0 20px; } .search-wrap,.filter-wrap { padding:14px 20px; } .container { padding:24px 20px; } .hero { padding:32px 20px; } .hero-title { font-size:30px; } }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">hyunlab</a>
  <ul>
    <li><a href="/main">works</a></li>
    <li><a href="/recipe" style="color:var(--pink)">레시피</a></li>
    <li><a href="/intro">intro</a></li>
  </ul>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">RECIPE ARCHIVE</div>
    <div class="hero-title">🍳 레시피 아카이브</div>
    <div class="hero-sub">직접 해본 요리 레시피와 후기 모음</div>
  </div>
</div>
<div class="search-wrap">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="메뉴 이름 또는 재료로 검색... (예: 간장, 돼지고기)">
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="num-asc">번호순</option>
    <option value="num-desc">번호 역순</option>
    <option value="name">이름순</option>
  </select>
</div>
<div class="filter-wrap">
  <span class="filter-label">카테고리</span>
  <button class="chip active" data-filter="all">전체</button>
  <button class="chip" data-filter="한식">한식</button>
  <button class="chip" data-filter="양식">양식</button>
  <button class="chip" data-filter="일식">일식</button>
  <button class="chip" data-filter="중식">중식</button>
  <button class="chip" data-filter="간식">간식</button>
  <button class="chip" data-filter="국/찌개">국/찌개</button>
  <button class="chip" data-filter="볶음">볶음</button>
  <button class="chip" data-filter="면">면</button>
</div>
<div class="container">
  <div class="count-bar">
    <span class="count-text">총 <strong id="countNum">2</strong>개의 레시피</span>
  </div>
  <div class="grid" id="recipeGrid">

    <a class="recipe-card" href="/recipe/01"
       data-num="1"
       data-name="돼지고기 간장불고기"
       data-tags="한식,볶음"
       data-ingredients="돼지고기,앞다리살,대파,양파,미림,청주,진간장,간장,참기름,백설탕,설탕,후추,통깨,다진마늘,마늘">
      <div class="card-thumb">🥩</div>
      <div class="card-body">
        <div class="card-num">RECIPE · 01</div>
        <div class="card-name">돼지고기 간장불고기</div>
        <div class="card-tags">
          <span class="tag">한식</span>
          <span class="tag">볶음</span>
        </div>
        <div class="card-desc">간장 양념에 재운 돼지 앞다리살 불고기</div>
        <div class="card-meta">
          <span>⏱ 숙성 8h+</span>
          <span>👥 3인분</span>
        </div>
        <div class="match-hint" id="hint_1"></div>
      </div>
    </a>

    <a class="recipe-card" href="/recipe/02"
       data-num="2"
       data-name="새송이버터구이"
       data-tags="한식,버섯요리"
       data-ingredients="새송이버섯,버터,다진마늘,진간장,맛술,굴소스">
      <div class="card-thumb">🍄</div>
      <div class="card-body">
        <div class="card-num">RECIPE · 02</div>
        <div class="card-name">새송이버터구이</div>
        <div class="card-tags">
          <span class="tag">한식</span>
          <span class="tag">버섯요리</span>
        </div>
        <div class="card-desc">버터향 가득, 전복같이 쫄깃한 새송이 버터구이</div>
        <div class="card-meta">
          <span>⏱ 15분</span>
          <span>👥 1~2인분</span>
        </div>
        <div class="match-hint" id="hint_2"></div>
      </div>
    </a>

  </div>
  <div class="empty" id="emptyState">
    <div class="empty-icon">🔍</div>
    <p>검색 결과가 없어요</p>
  </div>
</div>

<script>
  const chips = document.querySelectorAll('.chip');
  const cards = document.querySelectorAll('.recipe-card');
  const searchInput = document.getElementById('searchInput');
  const sortSelect = document.getElementById('sortSelect');
  const grid = document.getElementById('recipeGrid');
  const countNum = document.getElementById('countNum');
  const emptyState = document.getElementById('emptyState');
  let activeFilter = 'all';

  function filterAndSort() {
    const q = searchInput.value.trim().toLowerCase();
    let visible = [];

    cards.forEach(card => {
      const name = card.dataset.name.toLowerCase();
      const tags = card.dataset.tags.toLowerCase();
      const ingList = (card.dataset.ingredients || '').split(',').map(s => s.trim().toLowerCase());

      const matchName = !q || name.includes(q);
      const matchedIngs = q ? ingList.filter(i => i.includes(q)) : [];
      const matchIng = matchedIngs.length > 0;
      const matchSearch = matchName || matchIng;
      const matchFilter = activeFilter === 'all' || tags.includes(activeFilter);

      const hint = document.getElementById('hint_' + card.dataset.num);

      if (matchSearch && matchFilter) {
        card.style.display = '';
        visible.push(card);
        if (hint) {
          if (q && !matchName && matchIng) {
            hint.textContent = '🔍 재료 일치: ' + matchedIngs.slice(0,3).join(', ');
            hint.style.display = '';
          } else {
            hint.style.display = 'none';
          }
        }
      } else {
        card.style.display = 'none';
        if (hint) hint.style.display = 'none';
      }
    });

    const sortVal = sortSelect.value;
    visible.sort((a, b) => {
      if (sortVal === 'name') return a.dataset.name.localeCompare(b.dataset.name, 'ko');
      const na = parseInt(a.dataset.num), nb = parseInt(b.dataset.num);
      return sortVal === 'num-desc' ? nb - na : na - nb;
    });
    visible.forEach(c => grid.appendChild(c));
    countNum.textContent = visible.length;
    emptyState.classList.toggle('show', visible.length === 0);
  }

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      filterAndSort();
    });
  });
  searchInput.addEventListener('input', filterAndSort);
  sortSelect.addEventListener('change', filterAndSort);

  // ── 썸네일 로드
  const API = 'https://hyunlab-api.onrender.com';
  document.querySelectorAll('.recipe-card').forEach(async card => {
    const id = card.getAttribute('href').replace('/recipe/', '');
    const thumbEl = card.querySelector('.card-thumb');
    try {
      const res = await fetch(`${API}/api/recipes/${id}/photos`);
      const photos = await res.json();
      if (photos && photos.length > 0) {
        const img = document.createElement('img');
        img.src = photos[0].url;
        img.alt = card.dataset.name;
        img.loading = 'lazy';
        thumbEl.appendChild(img);
      }
    } catch(e) { /* 실패 시 이모지 그대로 */ }
  });
</script>
</body>
</html>
